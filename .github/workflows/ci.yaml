name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  build:
    name: Build Cross-Platform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Install build dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # CGO only needed for Linux (ALSA), macOS/Windows use purego
          CGO_ENABLED: ${{ matrix.goos == 'linux' && '1' || '0' }}
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.1.0-dev")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          GO_VERSION=$(go version | awk '{print $3}')

          go build \
            -ldflags="-s -w \
              -X 'github.com/nightmare-assault/nightmare-assault/internal/version.Version=$VERSION' \
              -X 'github.com/nightmare-assault/nightmare-assault/internal/version.Commit=$COMMIT' \
              -X 'github.com/nightmare-assault/nightmare-assault/internal/version.BuildTime=$BUILD_TIME' \
              -X 'github.com/nightmare-assault/nightmare-assault/internal/version.GoVersion=$GO_VERSION'" \
            -o nightmare${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/nightmare

      - name: Check binary size
        run: |
          ls -lh nightmare*
          SIZE=$(stat -c%s nightmare* 2>/dev/null || stat -f%z nightmare*)
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 50 ]; then
            echo "::warning::Binary size ($SIZE_MB MB) exceeds 50MB threshold"
          fi
